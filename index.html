<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ט.ל. ניהול מלאי</title>
<style>
:root {
  --blue:#2B7FD4; --blue-dark:#1A5FAA; --blue-light:#EBF4FF;
  --green:#2E9E6B; --red:#E53935; --orange:#F57C00;
  --grey:#F5F7FA; --grey2:#E8ECF0; --grey3:#90A4AE;
  --text:#1A2332; --text2:#546E7A; --white:#FFFFFF;
  --radius:14px; --shadow:0 2px 12px rgba(43,127,212,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--grey);color:var(--text);min-height:100vh;}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));}
.login-card{background:white;border-radius:20px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.login-logo{text-align:center;margin-bottom:20px;}
.login-logo svg{width:64px;height:64px;}
.login-title{font-size:18px;font-weight:800;color:var(--text);text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:24px;}
.login-input{width:100%;padding:14px 16px;border:2px solid var(--grey2);border-radius:12px;font-size:16px;outline:none;transition:border-color 0.2s;margin-bottom:12px;}
.login-input:focus{border-color:var(--blue);}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}
.login-error{color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none;}

/* APP */
.app{display:none;}
.header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(26,95,170,0.3);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.co-name{color:white;font-size:13px;font-weight:700;}
.co-sub{color:rgba(255,255,255,0.75);font-size:10px;}
.logo-circle{width:40px;height:40px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.search-wrap{position:relative;}
.search-input{width:100%;padding:9px 38px 9px 14px;border-radius:25px;border:none;font-size:14px;background:rgba(255,255,255,0.18);color:white;outline:none;}
.search-input::placeholder{color:rgba(255,255,255,0.6);}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.7);}

/* TABS */
.nav-tabs{display:flex;gap:6px;padding:12px 14px 0;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:7px 14px;border-radius:25px;border:2px solid var(--blue-light);background:white;color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.nav-tab.active{background:var(--blue);color:white;border-color:var(--blue);}

/* STATS */
.stats-bar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-card{flex-shrink:0;background:white;border-radius:12px;padding:8px 12px;min-width:80px;box-shadow:var(--shadow);text-align:center;}
.stat-num{font-size:20px;font-weight:800;color:var(--blue);line-height:1;}
.stat-num.red{color:var(--red);}
.stat-num.orange{color:var(--orange);}
.stat-label{font-size:9px;color:var(--text2);margin-top:2px;}

/* FILTERS */
.filter-bar{display:flex;gap:6px;padding:6px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:2px solid transparent;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;background:white;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.filter-chip.all{border-color:var(--blue-light);color:var(--blue);}
.filter-chip.all.active{background:var(--blue);color:white;}
.filter-chip.ok{border-color:#C8E6C9;color:var(--green);}
.filter-chip.ok.active{background:var(--green);color:white;}
.filter-chip.warn{border-color:#FFE0B2;color:var(--orange);}
.filter-chip.warn.active{background:var(--orange);color:white;}
.filter-chip.low{border-color:#FFCDD2;color:var(--red);}
.filter-chip.low.active{background:var(--red);color:white;}

/* CONTENT */
.content{padding:0 14px 90px;}
.cat-header{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;padding:14px 4px 5px;}
.item-card{background:white;border-radius:var(--radius);padding:11px 12px;margin-bottom:7px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;border-right:4px solid transparent;}
.item-card.ok{border-right-color:var(--green);}
.item-card.warn{border-right-color:var(--orange);}
.item-card.low{border-right-color:var(--red);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-meta{font-size:11px;color:var(--text2);margin-top:1px;}
.item-id{font-size:10px;color:var(--grey3);margin-top:1px;}
.item-qty{text-align:center;min-width:44px;}
.qty-num{font-size:20px;font-weight:800;line-height:1;}
.qty-num.ok{color:var(--green);}
.qty-num.warn{color:var(--orange);}
.qty-num.low{color:var(--red);}
.qty-label{font-size:9px;color:var(--text2);}
.item-btns{display:flex;flex-direction:column;gap:3px;}
.btn-take{background:var(--blue);color:white;border:none;border-radius:7px;padding:5px 9px;font-size:10px;font-weight:700;cursor:pointer;}
.btn-ret{background:var(--green);color:white;border:none;border-radius:7px;padding:5px 9px;font-size:10px;font-weight:700;cursor:pointer;}
.btn-transfer{background:#1B8A8F;color:#FFFFFF;border:none;border-radius:7px;padding:5px 9px;font-size:10px;font-weight:700;cursor:pointer;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--grey2);display:flex;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,0.06);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;color:var(--grey3);font-size:9px;font-weight:600;gap:2px;border:none;background:none;}
.bnav-btn.active{color:var(--blue);}
.bnav-icon{font-size:20px;line-height:1;}
.badge{background:var(--red);color:white;border-radius:50%;width:14px;height:14px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;position:absolute;top:4px;right:calc(50% - 16px);}

/* FAB */
.fab{position:fixed;bottom:72px;left:16px;width:52px;height:52px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:white;border:none;border-radius:50%;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(43,127,212,0.4);z-index:99;display:flex;align-items:center;justify-content:center;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:24px 24px 0 0;width:100%;max-width:600px;padding:18px 18px 24px;max-height:90vh;overflow-y:auto;animation:slideUp 0.25s ease;position:relative;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--grey2);border-radius:4px;margin:0 auto 14px;}
.modal-title{font-size:17px;font-weight:800;margin-bottom:3px;}
.modal-sub{font-size:11px;color:var(--text2);margin-bottom:16px;}
.form-group{margin-bottom:13px;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;}
.form-control{width:100%;padding:11px 12px;border:2px solid var(--grey2);border-radius:10px;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;background:var(--grey);}
.form-control:focus{border-color:var(--blue);background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.qty-ctrl{display:flex;align-items:center;gap:14px;}
.qty-btn-big{width:42px;height:42px;border-radius:50%;border:2px solid var(--blue);background:white;color:var(--blue);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-disp{font-size:26px;font-weight:800;min-width:50px;text-align:center;}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn-danger{width:100%;padding:13px;background:var(--red);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-close{position:absolute;top:18px;left:16px;background:var(--grey);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px;}
.dash-card{background:white;border-radius:14px;padding:14px;box-shadow:var(--shadow);text-align:center;}
.dash-num{font-size:28px;font-weight:900;line-height:1;}
.dash-label{font-size:11px;color:var(--text2);margin-top:3px;}
.dash-card.blue .dash-num{color:var(--blue);}
.dash-card.green .dash-num{color:var(--green);}
.dash-card.orange .dash-num{color:var(--orange);}
.dash-card.red .dash-num{color:var(--red);}
.section-title{font-size:13px;font-weight:700;color:var(--text2);padding:8px 14px 4px;}

/* LOG */
.log-item{background:white;border-radius:12px;padding:11px 12px;margin-bottom:7px;box-shadow:var(--shadow);}
.log-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.log-tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;}
.log-tag.take{background:#FFF3E0;color:var(--orange);}
.log-tag.ret{background:#E8F5E9;color:var(--green);}
.log-date{font-size:10px;color:var(--text2);}
.log-name{font-size:13px;font-weight:600;}
.log-detail{font-size:11px;color:var(--text2);margin-top:1px;}

/* ALERT ITEM */
.alert-item{background:white;border-radius:12px;padding:11px 12px;margin-bottom:7px;box-shadow:var(--shadow);border-right:4px solid var(--red);}
.alert-item.warn{border-right-color:var(--orange);}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text2);}
.empty-icon{font-size:44px;margin-bottom:10px;}

/* TOAST */
.toast{position:fixed;top:70px;right:50%;transform:translateX(50%);background:var(--text);color:white;padding:10px 18px;border-radius:25px;font-size:12px;font-weight:600;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* LOADER */
.loader{position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:400;display:flex;align-items:center;justify-content:center;display:none;}
.spinner{width:40px;height:40px;border:4px solid var(--grey2);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader"><div class="spinner"></div></div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" stroke="#2B7FD4" stroke-width="3" stroke-dasharray="5 4"/>
        <circle cx="32" cy="32" r="18" fill="#1B8A8F" opacity="0.9"/>
        <path d="M10 32 Q20 22 32 32 Q44 42 54 32" stroke="#2B7FD4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M32 10 Q22 20 32 32 Q42 44 32 54" stroke="#2B7FD4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M46 20 L54 32 L42 32" fill="#2B7FD4"/>
      </svg>
    </div>
    <div class="login-title">ט.ל. החברה לאיכות הסביבה</div>
    <div class="login-sub">מערכת ניהול מלאי</div>
    <input class="login-input" type="password" id="pwInput" placeholder="סיסמה..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">כניסה</button>
    <div class="login-error" id="loginErr">סיסמה שגויה</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="co-name">ט.ל. החברה לאיכות הסביבה בע"מ</div>
        <div class="co-sub">מערכת ניהול מלאי</div>
      </div>
      <div class="logo-circle">
        <svg viewBox="0 0 40 40" width="26" height="26" fill="none">
          <circle cx="20" cy="20" r="18" stroke="#2B7FD4" stroke-width="2" stroke-dasharray="4 3"/>
          <circle cx="20" cy="20" r="11" fill="#1B8A8F" opacity="0.85"/>
          <path d="M6 20 Q12 14 20 20 Q28 26 34 20" stroke="#2B7FD4" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M20 6 Q14 12 20 20 Q26 28 20 34" stroke="#2B7FD4" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M29 13 L34 20 L24 20" fill="#2B7FD4"/>
        </svg>
      </div>
    </div>
    <div class="search-wrap" id="searchWrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="חיפוש לפי שם, מידה, סוג, קטגוריה, מיקום..." id="searchInput" oninput="onSearch()">
    </div>
  </div>

  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" onclick="switchLoc('מחסן גדול',this)">🏭 מחסן גדול</button>
    <button class="nav-tab" onclick="switchLoc('מחסן קטן',this)">📦 מחסן קטן</button>
    <button class="nav-tab" onclick="switchLoc('רכב איציק',this)">🚐 רכב איציק</button>
    <button class="nav-tab" onclick="switchLoc('רכב בן',this)">🚐 רכב בן</button>
  </div>

  <div class="stats-bar" id="statsBar"></div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="content" id="mainContent"></div>

  <button class="fab" onclick="openAddItem()" id="fabBtn">＋</button>

  <div class="bottom-nav">
    <button class="bnav-btn active" id="bnav-inv" onclick="showView('inventory')" style="position:relative">
      <span class="bnav-icon">📦</span>מלאי
    </button>
    <button class="bnav-btn" id="bnav-dash" onclick="showView('dashboard')">
      <span class="bnav-icon">📊</span>דשבורד
    </button>
    <button class="bnav-btn" id="bnav-alert" onclick="showView('alerts')" style="position:relative">
      <span class="bnav-icon">⚠️</span>התראות
    </button>
    <button class="bnav-btn" id="bnav-log" onclick="showView('log')">
      <span class="bnav-icon">📋</span>יומן
    </button>
    <button class="bnav-btn" id="bnav-sync" onclick="syncSheets()">
      <span class="bnav-icon">🔄</span>סנכרון
    </button>
  </div>
</div>

<!-- TRANSACTION MODAL -->
<div class="modal-overlay" id="txModal" onclick="closeModal('txModal',event)">
  <div class="modal">
    <button class="btn-close" onclick="closeModal('txModal')">✕</button>
    <div class="modal-handle"></div>
    <div class="modal-title" id="txTitle">לקיחת פריט</div>
    <div class="modal-sub" id="txSub"></div>
    <div class="form-group">
      <label class="form-label">שם עובד</label>
      <select class="form-control" id="txWorker">
        <option value="">בחר עובד...</option>
        <option>גל</option><option>בן</option><option>איציק</option><option>בר</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">כמות</label>
      <div class="qty-ctrl">
        <button class="qty-btn-big" onclick="chQty(-1)">−</button>
        <div class="qty-disp" id="txQtyDisp">1</div>
        <button class="qty-btn-big" onclick="chQty(1)">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">הערה (אופציונלי)</label>
      <input class="form-control" type="text" id="txNote" placeholder="פרויקט, הערה...">
    </div>
    <button class="btn-primary" id="txSubmit" onclick="submitTx()">✓ אישור</button>
  </div>
</div>

<!-- ADD/EDIT ITEM MODAL -->
<div class="modal-overlay" id="itemModal" onclick="closeModal('itemModal',event)">
  <div class="modal">
    <button class="btn-close" onclick="closeModal('itemModal')">✕</button>
    <div class="modal-handle"></div>
    <div class="modal-title" id="itemModalTitle">הוספת פריט חדש</div>
    <div class="modal-sub" id="itemModalSub"></div>
    <div class="form-group">
      <label class="form-label">שם פריט *</label>
      <input class="form-control" type="text" id="fName" placeholder="שם הפריט...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">קטגוריה</label>
        <input class="form-control" type="text" id="fCat" placeholder="קטגוריה...">
      </div>
      <div class="form-group">
        <label class="form-label">סוג</label>
        <input class="form-control" type="text" id="fType" placeholder="סוג...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">מידה</label>
        <input class="form-control" type="text" id="fSize" placeholder='מידה...'>
      </div>
      <div class="form-group">
        <label class="form-label">כמות</label>
        <input class="form-control" type="number" id="fQty" placeholder="0" min="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">סף התראה</label>
        <input class="form-control" type="number" id="fMin" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">מחיר (₪)</label>
        <input class="form-control" type="number" id="fPrice" placeholder="0" min="0">
      </div>
    </div>
    <div class="form-group" id="locGroup">
      <label class="form-label">מיקום *</label>
      <select class="form-control" id="fLoc">
        <option value="מחסן גדול">🏭 מחסן גדול</option>
        <option value="מחסן קטן">📦 מחסן קטן</option>
        <option value="רכב איציק">🚐 רכב איציק</option>
        <option value="רכב בן">🚐 רכב בן</option>
      </select>
    </div>
    <button class="btn-primary" onclick="submitItem()">✓ שמור</button>
    <button class="btn-danger" id="deleteBtn" onclick="deleteItem()" style="display:none">🗑 מחק פריט</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- TRANSFER MODAL -->
<div class="modal-overlay" id="transferModal" onclick="closeModal('transferModal',event)">
  <div class="modal" style="position:relative">
    <button class="btn-close" onclick="closeModal('transferModal')">✕</button>
    <div class="modal-handle"></div>
    <div class="modal-title">🔄 העברת פריט</div>
    <div class="modal-sub" id="transferSub"></div>
    <div class="form-group">
      <label class="form-label">מיקום מקור</label>
      <input class="form-control" type="text" id="transferFrom" readonly style="background:#f5f5f5;">
    </div>
    <div class="form-group">
      <label class="form-label">מיקום יעד</label>
      <select class="form-control" id="transferTo">
        <option value="מחסן גדול">🏭 מחסן גדול</option>
        <option value="מחסן קטן">📦 מחסן קטן</option>
        <option value="רכב איציק">🚐 רכב איציק</option>
        <option value="רכב בן">🚐 רכב בן</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">שם עובד</label>
      <select class="form-control" id="transferWorker">
        <option value="">בחר עובד...</option>
        <option>גל</option><option>בן</option><option>איציק</option><option>בר</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">כמות</label>
      <div class="qty-ctrl">

let state = {
  inventory: JSON.parse(localStorage.getItem('epc_inv') || JSON.stringify(SEED)),
  log: JSON.parse(localStorage.getItem('epc_log') || '[]'),
  currentLoc: 'מחסן גדול',
  currentView: 'inventory',
  activeFilter: 'all',
  txItem: null, txType: null, txQty: 1, txLoc: null,
  transferItem: null, transferLoc: null, transferQty: 1,
  editItem: null, editLoc: null,
  lastSync: localStorage.getItem('epc_sync') || null
};

function save() {
  localStorage.setItem('epc_inv', JSON.stringify(state.inventory));
  localStorage.setItem('epc_log', JSON.stringify(state.log));
}

// ── Auth ──────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderInventory();
    updateAlertBadge();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}

// ── Status ────────────────────────────────────────
function getStatus(qty, min) {
  if (qty === 0) return 'low';
  if (min > 0 && qty <= min) return 'warn';
  return 'ok';
}
function statusLabel(s) { return {ok:'תקין',warn:'התראה',low:'אזל'}[s]; }

// ── Views ─────────────────────────────────────────
function showView(v) {
  state.currentView = v;
  ['inv','dash','alert','log','sync'].forEach(x =>
    document.getElementById('bnav-'+x)?.classList.remove('active'));
  const map = {inventory:'inv',dashboard:'dash',alerts:'alert',log:'log'};
  if (map[v]) document.getElementById('bnav-'+map[v])?.classList.add('active');

  const showInv = v === 'inventory';
  document.getElementById('navTabs').style.display = showInv ? 'flex' : 'none';
  document.getElementById('filterBar').style.display = showInv ? 'flex' : 'none';
  document.getElementById('searchWrap').style.display = showInv ? 'block' : 'none';
  document.getElementById('fabBtn').style.display = showInv ? 'flex' : 'none';

  if (v === 'inventory') renderInventory();
  else if (v === 'dashboard') renderDashboard();
  else if (v === 'alerts') renderAlerts();
  else if (v === 'log') renderLog();
}

function switchLoc(loc, el) {
  state.currentLoc = loc;
  state.activeFilter = 'all';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderInventory();
}

function setFilter(f) { state.activeFilter = f; renderInventory(); }

// ── Inventory ─────────────────────────────────────
function renderStats() {
  const items = state.inventory[state.currentLoc] || [];
  const low = items.filter(i => i.qty === 0).length;
  const warn = items.filter(i => i.qty > 0 && i.min > 0 && i.qty <= i.min).length;
  const ok = items.length - low - warn;
  const totalQty = items.reduce((s,i) => s + (parseInt(i.qty)||0), 0);
  const af = state.activeFilter;
  document.getElementById('statsBar').innerHTML =
    `<div class="stat-card"><div class="stat-num">${items.length}</div><div class="stat-label">פריטים</div></div>
     <div class="stat-card"><div class="stat-num">${totalQty}</div><div class="stat-label">יחידות</div></div>
     <div class="stat-card"><div class="stat-num orange">${warn}</div><div class="stat-label">התראה</div></div>
     <div class="stat-card"><div class="stat-num red">${low}</div><div class="stat-label">אזל</div></div>`;
  document.getElementById('filterBar').innerHTML =
    `<button class="filter-chip all ${af==='all'?'active':''}" onclick="setFilter('all')">הכל <b>${items.length}</b></button>
     <button class="filter-chip ok ${af==='ok'?'active':''}" onclick="setFilter('ok')">✅ תקין <b>${ok}</b></button>
     <button class="filter-chip warn ${af==='warn'?'active':''}" onclick="setFilter('warn')">⚠️ התראה <b>${warn}</b></button>
     <button class="filter-chip low ${af==='low'?'active':''}" onclick="setFilter('low')">🔴 אזל <b>${low}</b></button>`;
}

function renderInventory() {
  renderStats();
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let items = state.inventory[state.currentLoc] || [];

  // Filter by status
  if (state.activeFilter !== 'all')
    items = items.filter(i => getStatus(parseInt(i.qty)||0, parseInt(i.min)||0) === state.activeFilter);

  // Search across multiple fields
  if (q) items = items.filter(i =>
    (i.name||'').toLowerCase().includes(q) ||
    (i.id||'').toLowerCase().includes(q) ||
    (i.cat||'').toLowerCase().includes(q) ||
    (i.type||'').toLowerCase().includes(q) ||
    (i.size||'').toLowerCase().includes(q) ||
    state.currentLoc.includes(q)
  );

  if (!items.length) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty"><div class="empty-icon">🔍</div><div>לא נמצאו פריטים</div></div>`;
    return;
  }

  const cats = {};
  items.forEach(i => { if (!cats[i.cat||'כללי']) cats[i.cat||'כללי'] = []; cats[i.cat||'כללי'].push(i); });

  let html = '';
  Object.entries(cats).forEach(([cat, citems]) => {
    html += `<div class="cat-header">${cat}</div>`;
    citems.forEach(item => {
      const qty = parseInt(item.qty)||0;
      const min = parseInt(item.min)||0;
      const s = getStatus(qty, min);
      html += `<div class="item-card ${s}" onclick="openEdit('${item.id}','${state.currentLoc}')">
        <div class="item-info">
          <div class="item-name">${item.name||''}</div>
          <div class="item-meta">${[item.size,item.type].filter(Boolean).join(' · ')}</div>
          <div class="item-id">${item.id}</div>
        </div>
        <div class="item-qty">
          <div class="qty-num ${s}">${qty}</div>
          <div class="qty-label">יחידות</div>
        </div>
        <div class="item-btns">
          <button class="btn-take" onclick="event.stopPropagation();openTx('take','${item.id}','${state.currentLoc}')">לקח</button>
          <button class="btn-ret" onclick="event.stopPropagation();openTx('ret','${item.id}','${state.currentLoc}')">החזר</button>
          <button class="btn-transfer" onclick="event.stopPropagation();openTransfer('${item.id}','${state.currentLoc}')">העבר</button>
        </div>
      </div>`;
    });
  });
  document.getElementById('mainContent').innerHTML = html;
}

function onSearch() { renderInventory(); }

// ── Dashboard ─────────────────────────────────────
function renderDashboard() {
  document.getElementById('statsBar').innerHTML = '';
  document.getElementById('filterBar').innerHTML = '';

  const today = new Date().toLocaleDateString('he-IL');
  const todayLog = state.log.filter(e => e.date && e.date.includes(today));
  const takesToday = todayLog.filter(e => e.type === 'take').length;
  const retToday = todayLog.filter(e => e.type === 'ret').length;

  let totalItems = 0, totalLow = 0, totalWarn = 0;
  LOCATIONS.forEach(loc => {
    const items = state.inventory[loc] || [];
    totalItems += items.length;
    items.forEach(i => {
      const qty = parseInt(i.qty)||0, min = parseInt(i.min)||0;
      if (qty === 0) totalLow++;
      else if (min > 0 && qty <= min) totalWarn++;
    });
  });

  let html = `<div class="dash-grid">
    <div class="dash-card blue"><div class="dash-num">${totalItems}</div><div class="dash-label">סוגי פריטים</div></div>
    <div class="dash-card red"><div class="dash-num">${totalLow}</div><div class="dash-label">פריטים שאזלו</div></div>
    <div class="dash-card orange"><div class="dash-num">${totalWarn}</div><div class="dash-label">בהתראה</div></div>
    <div class="dash-card green"><div class="dash-num">${state.log.length}</div><div class="dash-label">סה"כ תנועות</div></div>
  </div>
  <div class="section-title">📅 פעילות היום</div>
  <div class="dash-grid">
    <div class="dash-card orange"><div class="dash-num">${takesToday}</div><div class="dash-label">לקיחות היום</div></div>
    <div class="dash-card green"><div class="dash-num">${retToday}</div><div class="dash-label">החזרות היום</div></div>
  </div>
  <div class="section-title">📦 מלאי לפי מיקום</div>
  <div style="padding:0 14px">`;

  LOCATIONS.forEach(loc => {
    const items = state.inventory[loc] || [];
    const low = items.filter(i => (parseInt(i.qty)||0) === 0).length;
    const total = items.reduce((s,i) => s+(parseInt(i.qty)||0), 0);
    html += `<div class="item-card ok" onclick="switchLocDash('${loc}')" style="margin-bottom:8px">
      <div class="item-info"><div class="item-name">${loc}</div><div class="item-meta">${items.length} סוגי פריטים</div></div>
      <div class="item-qty"><div class="qty-num ok">${total}</div><div class="qty-label">יחידות</div></div>
      ${low > 0 ? `<div style="background:#FFCDD2;color:var(--red);border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700">${low} אזלו</div>` : ''}
    </div>`;
  });

  if (state.lastSync) html += `<div style="text-align:center;font-size:11px;color:var(--text2);padding:8px">סנכרון אחרון: ${state.lastSync}</div>`;

  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function switchLocDash(loc) {
  state.currentLoc = loc;
  showView('inventory');
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', LOCATIONS[i] === loc);
  });
}

// ── Alerts ────────────────────────────────────────
function renderAlerts() {
  let html = '<div class="section-title">🔴 פריטים שאזלו</div><div style="padding:0 14px">';
  let anyLow = false;
  LOCATIONS.forEach(loc => {
    (state.inventory[loc]||[]).filter(i => (parseInt(i.qty)||0) === 0).forEach(item => {
      anyLow = true;
      html += `<div class="alert-item">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${loc} · ${[item.size,item.type].filter(Boolean).join(' · ')}</div>
        <div class="item-id">${item.id}</div>
      </div>`;
    });
  });
  if (!anyLow) html += '<div class="empty" style="padding:20px"><div class="empty-icon">✅</div><div>אין פריטים שאזלו</div></div>';

  html += '</div><div class="section-title">⚠️ פריטים בהתראה</div><div style="padding:0 14px">';
  let anyWarn = false;
  LOCATIONS.forEach(loc => {
    (state.inventory[loc]||[]).filter(i => {
      const qty = parseInt(i.qty)||0, min = parseInt(i.min)||0;
      return qty > 0 && min > 0 && qty <= min;
    }).forEach(item => {
      anyWarn = true;
      html += `<div class="alert-item warn">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${loc} · נותרו ${item.qty} (מינימום: ${item.min})</div>
        <div class="item-id">${item.id}</div>
      </div>`;
    });
  });
  if (!anyWarn) html += '<div class="empty" style="padding:20px"><div class="empty-icon">✅</div><div>אין פריטים בהתראה</div></div>';
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function updateAlertBadge() {
  let count = 0;
  LOCATIONS.forEach(loc => {
    (state.inventory[loc]||[]).forEach(i => {
      const qty = parseInt(i.qty)||0, min = parseInt(i.min)||0;
      if (qty === 0 || (min > 0 && qty <= min)) count++;
    });
  });
  const btn = document.getElementById('bnav-alert');
  const existing = btn.querySelector('.badge');
  if (existing) existing.remove();
  if (count > 0) {
    const b = document.createElement('span');
    b.className = 'badge';
    b.textContent = count > 9 ? '9+' : count;
    btn.appendChild(b);
  }
}

// ── Log ───────────────────────────────────────────
function renderLog() {
  if (!state.log.length) {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty"><div class="empty-icon">📋</div><div>אין תנועות עדיין</div></div>';
    return;
  }
  const reversed = [...state.log].reverse();
  let html = '<div style="padding:0 14px">';
  reversed.forEach(e => {
    html += `<div class="log-item">
      <div class="log-head">
        <span class="log-tag ${e.type}">${e.type==='take'?'לקיחה':'החזרה'}</span>
        <span class="log-date">${e.date}</span>
      </div>
      <div class="log-name">${e.name}</div>
      <div class="log-detail">${e.worker} · ${e.loc} · ${e.qty} יחידות${e.note?' · '+e.note:''}</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

// ── Transaction ───────────────────────────────────
function openTx(type, itemId, loc) {
  const items = state.inventory[loc]||[];
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  state.txItem = item; state.txType = type; state.txQty = 1; state.txLoc = loc;
  document.getElementById('txQtyDisp').textContent = '1';
  document.getElementById('txNote').value = '';
  document.getElementById('txWorker').value = '';
  document.getElementById('txTitle').textContent = type === 'take' ? '📤 לקיחת פריט' : '📥 החזרת פריט';
  document.getElementById('txSub').textContent = `${item.name} · ${[item.size,item.type].filter(Boolean).join(' · ')} · ${loc}`;
  document.getElementById('txSubmit').style.background = type === 'take' ?
    'linear-gradient(135deg,var(--blue-dark),var(--blue))' :
    'linear-gradient(135deg,#1B6E4A,var(--green))';
  document.getElementById('txModal').classList.add('open');
}

function chQty(d) {
  state.txQty = Math.max(1, state.txQty + d);
  document.getElementById('txQtyDisp').textContent = state.txQty;
}

function submitTx() {
  const worker = document.getElementById('txWorker').value;
  if (!worker) { toast('⚠️ יש לבחור עובד'); return; }
  const {txItem: item, txType: type, txQty: qty, txLoc: loc} = state;
  const note = document.getElementById('txNote').value;
  const idx = (state.inventory[loc]||[]).findIndex(i => i.id === item.id);
  if (idx < 0) return;

  if (type === 'take') {
    if ((parseInt(state.inventory[loc][idx].qty)||0) < qty) { toast('⚠️ אין מספיק יחידות'); return; }
    state.inventory[loc][idx].qty = (parseInt(state.inventory[loc][idx].qty)||0) - qty;
  } else {
    state.inventory[loc][idx].qty = (parseInt(state.inventory[loc][idx].qty)||0) + qty;
  }

  const now = new Date();
  const entry = {
    type, worker, qty, loc, note, name: item.name, id: item.id,
    date: now.toLocaleDateString('he-IL') + ' ' + now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})
  };
  state.log.push(entry);
  save();

  // Sync to Sheets if configured
  if (SCRIPT_URL) {
    fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({
      action:'updateQty', location:loc, mkt:item.id, newQty: state.inventory[loc][idx].qty
    })}).catch(console.error);
    fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({
      action:'addTransaction', type, worker, qty, location:loc, mkt:item.id, name:item.name, note
    })}).catch(console.error);
  }

  closeModal('txModal');
  toast(type === 'take' ? `✓ ${qty} יחידות נלקחו` : `✓ ${qty} יחידות הוחזרו`);
  renderInventory();
  updateAlertBadge();
}

// ── Add / Edit Item ───────────────────────────────
function openAddItem() {
  state.editItem = null; state.editLoc = null;
  ['fName','fCat','fType','fSize'].forEach(id => document.getElementById(id).value = '');
  ['fQty','fMin','fPrice'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fLoc').value = state.currentLoc;
  document.getElementById('itemModalTitle').textContent = '➕ הוספת פריט חדש';
  document.getElementById('itemModalSub').textContent = 'מק"ט יוקצה אוטומטית';
  document.getElementById('locGroup').style.display = 'block';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('itemModal').classList.add('open');
}

function openEdit(itemId, loc) {
  const items = state.inventory[loc]||[];
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  state.editItem = item; state.editLoc = loc;
  document.getElementById('fName').value = item.name||'';
  document.getElementById('fCat').value = item.cat||'';
  document.getElementById('fType').value = item.type||'';
  document.getElementById('fSize').value = item.size||'';
  document.getElementById('fQty').value = item.qty||0;
  document.getElementById('fMin').value = item.min||0;
  document.getElementById('fPrice').value = item.price||0;
  document.getElementById('itemModalTitle').textContent = '✏️ עריכת פריט';
  document.getElementById('itemModalSub').textContent = `${item.id} · ${loc}`;
  document.getElementById('locGroup').style.display = 'none';
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('itemModal').classList.add('open');
}

function submitItem() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { toast('⚠️ יש להזין שם פריט'); return; }

  const data = {
    name, cat: document.getElementById('fCat').value.trim(),
    type: document.getElementById('fType').value.trim(),
    size: document.getElementById('fSize').value.trim(),
    qty: parseInt(document.getElementById('fQty').value)||0,
    min: parseInt(document.getElementById('fMin').value)||0,
    price: parseInt(document.getElementById('fPrice').value)||0,
  };

  if (state.editItem) {
    // Edit existing
    const loc = state.editLoc;
    const idx = (state.inventory[loc]||[]).findIndex(i => i.id === state.editItem.id);
    if (idx >= 0) Object.assign(state.inventory[loc][idx], data);
    if (SCRIPT_URL) {
      fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({
        action:'updateItem', location:loc, mkt:state.editItem.id, ...data
      })}).catch(console.error);
    }
    toast('✓ פריט עודכן');
  } else {
    // Add new
    const loc = document.getElementById('fLoc').value;
    const maxNum = getMaxMkt();
    const newMkt = 'INV-' + String(maxNum + 1).padStart(3, '0');
    const newItem = {id: newMkt, ...data, notes: ''};
    if (!state.inventory[loc]) state.inventory[loc] = [];
    state.inventory[loc].push(newItem);
    if (SCRIPT_URL) {
      fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({
        action:'addItem', location:loc, ...data
      })}).catch(console.error);
    }
    toast(`✓ פריט נוסף (${newMkt})`);
  }

  save();
  closeModal('itemModal');
  renderInventory();
}

function deleteItem() {
  if (!state.editItem) return;
  if (!confirm('למחוק את הפריט ' + state.editItem.name + '?')) return;
  const loc = state.editLoc;
  const idx = (state.inventory[loc]||[]).findIndex(i => i.id === state.editItem.id);
  if (idx >= 0) state.inventory[loc].splice(idx, 1);
  if (SCRIPT_URL) {
    fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({
      action:'deleteItem', location:loc, mkt:state.editItem.id
    })}).catch(console.error);
  }
  save();
  closeModal('itemModal');
  toast('🗑 פריט נמחק');
  renderInventory();
}

function getMaxMkt() {
  let max = 428; // based on existing data
  LOCATIONS.forEach(loc => {
    (state.inventory[loc]||[]).forEach(i => {
      if (i.id && i.id.startsWith('INV-')) {
        const n = parseInt(i.id.replace('INV-','').split('-')[0]);
        if (n > max) max = n;
      }
    });
  });
  return max;
}

// ── Sync ──────────────────────────────────────────
async function syncSheets() {
  if (!SCRIPT_URL) {
    toast('⚠️ Apps Script לא מוגדר עדיין');
    return;
  }
  showLoader(true);
  try {
    const res = await fetch(SCRIPT_URL + '?action=getAll');
    const json = await res.json();
    if (json.success) {
      // Map from Sheets format to app format
      const newInv = {};
      LOCATIONS.forEach(loc => {
        const rows = json.data[loc] || [];
        newInv[loc] = rows.map(row => {
          // Try all possible מקט column name variants
          const mkt = (row['מק"ט'] || row["מק'ט"] || row['מקט'] || row['מק״ט'] || '').toString().trim();
          const name = (row['שם פריט'] || '').toString().trim();
          const cat = (row['קטגוריה'] || '').toString().trim();
          const size = (row['מידה'] || '').toString().trim();
          const type = (row['סוג'] || '').toString().trim();
          const qty = parseInt(row['כמות'])||0;
          const min = parseInt(row['סף התרעה']||row['סף התראה'])||0;
          const price = parseFloat(row['מחיר (₪)'])||0;
          const notes = (row['הערות'] || '').toString().trim();
          return { id: mkt, cat, name, size, type, qty, min, price, notes };
        }).filter(i => i.id);
      });
      state.inventory = newInv;
      state.lastSync = new Date().toLocaleString('he-IL');
      localStorage.setItem('epc_sync', state.lastSync);
      save();
      renderInventory();
      updateAlertBadge();
      toast('✓ סנכרון הושלם בהצלחה');
    } else {
      toast('שגיאה: ' + json.error);
    }
  } catch(e) {
    toast('❌ שגיאת חיבור');
  } finally {
    showLoader(false);
  }
}

// ── Utils ─────────────────────────────────────────
function closeModal(id, e) {
  if (!e || e.target === document.getElementById(id))
    document.getElementById(id).classList.remove('open');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showLoader(v) {
  document.getElementById('loader').style.display = v ? 'flex' : 'none';
}

// ── Transfer ──────────────────────────────────────
function openTransfer(itemId, loc) {
  const items = state.inventory[loc]||[];
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  state.transferItem = item;
  state.transferLoc = loc;
  state.transferQty = 1;
  document.getElementById('transferFrom').value = loc;
  document.getElementById('transferSub').textContent = `${item.name} · ${[item.size,item.type].filter(Boolean).join(' · ')}`;
  document.getElementById('transferQtyDisp').textContent = '1';
  document.getElementById('transferNote').value = '';
  document.getElementById('transferWorker').value = '';
  // Remove current location from options
  const sel = document.getElementById('transferTo');
  Array.from(sel.options).forEach(o => {
    o.disabled = o.value === loc;
    if (o.value !== loc) sel.value = o.value;
  });
  document.getElementById('transferModal').classList.add('open');
}

function chTransferQty(d) {
  state.transferQty = Math.max(1, state.transferQty + d);
  document.getElementById('transferQtyDisp').textContent = state.transferQty;
}

function submitTransfer() {
  const worker = document.getElementById('transferWorker').value;
  if (!worker) { toast('⚠️ יש לבחור עובד'); return; }
  const toLoc = document.getElementById('transferTo').value;
  const fromLoc = state.transferLoc;
  const item = state.transferItem;
  const qty = state.transferQty;
  const note = document.getElementById('transferNote').value;

  if (toLoc === fromLoc) { toast('⚠️ מקור ויעד זהים'); return; }

  // Check qty in source
  const fromIdx = (state.inventory[fromLoc]||[]).findIndex(i => i.id === item.id);
  if (fromIdx < 0) { toast('⚠️ פריט לא נמצא במקור'); return; }
  if ((parseInt(state.inventory[fromLoc][fromIdx].qty)||0) < qty) { toast('⚠️ אין מספיק יחידות'); return; }

  // Deduct from source
  state.inventory[fromLoc][fromIdx].qty = (parseInt(state.inventory[fromLoc][fromIdx].qty)||0) - qty;

  // Add to destination
  const toIdx = (state.inventory[toLoc]||[]).findIndex(i => i.id === item.id);
  if (toIdx >= 0) {
    // Item exists in destination
    state.inventory[toLoc][toIdx].qty = (parseInt(state.inventory[toLoc][toIdx].qty)||0) + qty;
  } else {
    // Add new item to destination
    if (!state.inventory[toLoc]) state.inventory[toLoc] = [];
    state.inventory[toLoc].push({...item, qty});
  }

  // Log
  const now = new Date();
  const dateStr = now.toLocaleDateString('he-IL') + ' ' + now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  state.log.push({
    type: 'transfer', worker, qty, loc: fromLoc, toLoc, note,
    name: item.name, id: item.id, date: dateStr
  });
  save();

  // Sync to Sheets
  if (SCRIPT_URL) {
    fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({
      action:'updateQty', location:fromLoc, mkt:item.id,
      newQty: state.inventory[fromLoc][fromIdx].qty
    })}).catch(console.error);
    if (toIdx >= 0) {
      fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({
        action:'updateQty', location:toLoc, mkt:item.id,
        newQty: state.inventory[toLoc][toIdx].qty
      })}).catch(console.error);
    }
    fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({
      action:'addTransaction', type:'transfer', worker, qty,
      location: fromLoc + ' → ' + toLoc, mkt:item.id, name:item.name, note
    })}).catch(console.error);
  }

  closeModal('transferModal');
  toast(`✓ ${qty} יחידות הועברו מ${fromLoc} ל${toLoc}`);
  renderInventory();
  updateAlertBadge();
}

// ── Init ──────────────────────────────────────────
// Check if already logged in this session
if (sessionStorage.getItem('epc_auth') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderInventory();
  updateAlertBadge();
}

document.getElementById('loginScreen').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// Save session on login
const origLogin = doLogin;
window.doLogin = function() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) sessionStorage.setItem('epc_auth','1');
  origLogin();
};
</script>
